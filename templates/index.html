<!DOCTYPE html>
<html>
<head>
    <title>Heart Disease Prediction</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            background-color: #f2f2f2;
        }

        form {
            background: white;
            padding: 20px;
            display: inline-block;
            border-radius: 10px;
            margin-top: 20px;
        }

        input {
            margin: 5px;
            padding: 8px;
            width: 200px;
        }

        button {
            padding: 10px 20px;
            background: blue;
            color: white;
            border: none;
        }

        h2 {
            color: green;
        }
    </style>
</head>
<body>

<h1>Heart Disease Prediction</h1>

<form action="/predict" method="post">
    <input type="number" name="age" placeholder="Age" required><br>
    <input type="number" name="sex" placeholder="Sex (1=Male,0=Female)" required><br>
    <input type="number" name="cp" placeholder="Chest Pain Type" required><br>
    <input type="number" name="trestbps" placeholder="Blood Pressure" required><br>
    <input type="number" name="chol" placeholder="Cholesterol" required><br>
    <input type="number" name="fbs" placeholder="Fasting Blood Sugar" required><br>
    <input type="number" name="restecg" placeholder="Rest ECG" required><br>
    <input type="number" name="thalach" placeholder="Max Heart Rate" required><br>
    <input type="number" name="exang" placeholder="Exercise Induced Angina" required><br>
    <input type="number" step="any" name="oldpeak" placeholder="Oldpeak" required><br>
    <input type="number" name="slope" placeholder="Slope" required><br>
    <input type="number" name="ca" placeholder="CA" required><br>
    <input type="number" name="thal" placeholder="Thal" required><br>

    <button type="submit">Predict</button>
</form>

{% if prediction_text %}
    <h2>{{ prediction_text }}</h2>
{% endif %}

</body>
</html>
